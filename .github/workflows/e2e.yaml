name: e2e tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  SOURCE_DATE_EPOCH: 1669683910

permissions: {}

jobs:
  rebuild:
    name: rebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        cfg:
          # build and rebuild examples
          - cargo-build.yaml
          - gnu-hello.yaml
          - go-build.yaml
          - minimal.yaml
          - npm-install.yaml
          - pnpm-install.yaml

          - melange.yaml # special; builds melange itself

    container:
      image: alpine:latest
      options: |
        --cap-add NET_ADMIN --cap-add SYS_ADMIN --security-opt seccomp=unconfined --security-opt apparmor:unconfined

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Fetch dependencies
        run: |
          apk upgrade -Ua
          apk add go cue-cli build-base git bubblewrap jq

      - name: Build melange
        run: |
          make melange
          ./melange keygen

      - name: Build package
        env:
          MATRIX_CFG: ${{ matrix.cfg }}
        run: |
          path=examples/$MATRIX_CFG
          if [ "$MATRIX_CFG" == "melange.yaml" ]; then
            path="melange.yaml"
          fi
          ./melange build $path --arch=x86_64 --namespace=wolfi

      - name: Rebuild package
        run: |
          ./melange rebuild ./packages/x86_64/*.apk

      - name: Upload APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          path: |
            packages/**
            rebuilt-packages/**
          name: rebuild-${{matrix.cfg}}
