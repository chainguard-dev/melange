name: Run autoconf make

inputs:
  dir:
    description: |
      The directory containing the Makefile.
    default: .

  opts:
    description: |
      Options to pass to the make command.
    default: ''

  targets:
    description: |
      Makefile targets to build, space-separated.
    default: ''

needs:
  packages:
    - make

pipeline:
  - runs: |
      make -C "${{inputs.dir}}" -j$(nproc) V=1 ${{inputs.opts}} ${{inputs.targets}}
